name: Milestone countdown reminder

# Daily countdown push for birthdays/anniversaries/custom days: for every
# milestone whose countdown window is open (notify_days_before, 7 by default,
# 0 = off), both partners get "N days to {label}" (or "Today is..." on the
# day). Same setup as daily-reminder.yml / prompt-reminder.yml (repo secrets
# APP_URL + CRON_SECRET, matching CRON_SECRET in Vercel).
#
# GitHub cron is UTC. 03:00 UTC = 8:30 AM IST. Adjust to your own morning.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {} # lets you run it by hand from the Actions tab to test

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Ping milestone countdown reminder
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL or CRON_SECRET secret is not set; skipping."
            exit 0
          fi
          response=$(curl -sS -w '\n%{http_code}' -X POST \
            "$APP_URL/api/cron/reminders?kind=milestone" \
            -H "Authorization: Bearer $CRON_SECRET")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $status"
          echo "$body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Reminder endpoint returned $status"
            exit 1
          fi
          if echo "$body" | grep -q '"sent":0' && ! echo "$body" | grep -q '"due":0'; then
            echo "::warning::Milestones were due but no pushes were delivered. Check the failed counts above."
          fi
