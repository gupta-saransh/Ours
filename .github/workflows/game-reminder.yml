name: This or That reminder

# Twice-a-day nudge for the daily game: anyone whose couple has a round open
# that THEY have not played yet gets a Web Push. The endpoint decides who is
# actually waiting on a question (see hasUnplayedRound in
# api/_lib/game-rounds.ts), so a run that lands between rounds simply reports
# "nothing-open" and sends nothing rather than nagging.
#
# Same setup as daily-reminder.yml / prompt-reminder.yml (repo secrets APP_URL
# + CRON_SECRET, matching CRON_SECRET in Vercel).
#
# GitHub cron is UTC.
#   09:00 UTC = 2:30 PM IST  (afternoon)
#   15:00 UTC = 8:30 PM IST  (evening, ahead of the 9:30 PM daily reminder)
# The day's second question opens a few hours after the first is settled, so
# these two runs naturally cover one round each.

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch: {} # lets you run it by hand from the Actions tab to test

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Ping This or That reminder
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL or CRON_SECRET secret is not set; skipping."
            exit 0
          fi
          # Print the endpoint's report (who was skipped and why), fail the job
          # on a non-2xx, and warn when nothing was delivered.
          response=$(curl -sS -w '\n%{http_code}' -X POST \
            "$APP_URL/api/cron/reminders?kind=game" \
            -H "Authorization: Bearer $CRON_SECRET")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $status"
          echo "$body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Reminder endpoint returned $status"
            exit 1
          fi
          if echo "$body" | grep -q '"sent":0'; then
            echo "::warning::No pushes were delivered. Check the skipped/failed counts above (nothing-open is normal between rounds)."
          fi
