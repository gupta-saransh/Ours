name: Date reminders

# Runs hourly and pings the app so it can send "your date is coming up" pushes
# at ~24h, ~6h, and ~1h before each accepted date. See
# api/_routes/cron-reminders.ts (kind=dates). Uses the same repo secrets as the
# daily reminder: CRON_SECRET (matching the Vercel env var) and APP_URL.

on:
  schedule:
    - cron: '5 * * * *' # every hour, at :05
  workflow_dispatch: {}

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Ping date reminders
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL or CRON_SECRET secret is not set; skipping."
            exit 0
          fi
          curl -fsS -X POST "$APP_URL/api/cron/reminders?kind=dates" \
            -H "Authorization: Bearer $CRON_SECRET"
