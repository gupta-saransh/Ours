name: Tests

# Runs on every push and every pull request: type checking plus the vitest
# suite over api/**. Nothing here touches the database, Ably, or the network,
# so it needs no secrets and is safe on forks.

on:
  push:
  pull_request:
  workflow_dispatch: {}

# A newer push to the same branch cancels the older run.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` installs exactly what package-lock.json pins, and fails if the
      # lockfile is out of sync with package.json.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test
